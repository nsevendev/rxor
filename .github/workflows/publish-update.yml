name: Publish to npm

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - release-*

permissions:
  contents: write

jobs:
  publish:
    if: github.event.pull_request.merged == true
    name: Lint, Test, Build & Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Determine bump type
        run: |
          COMMIT_MSG="${{ github.event.pull_request.title }}"
          BUMP_TYPE=$(echo "$COMMIT_MSG" | grep -oE '\[bump:(patch|minor|major)\]' | sed 's/\[bump://;s/\]//')
          if [[ ! "$BUMP_TYPE" =~ ^(patch|minor|major)$ ]]; then
            BUMP_TYPE="patch"
          fi
          echo "BUMP_TYPE=$BUMP_TYPE" >> $GITHUB_ENV
          echo "Bump type: $BUMP_TYPE (from PR title)"

      - name: Bump version
        run: |
          npm version ${{ env.BUMP_TYPE }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "New version: $VERSION"

      - name: Determine npm tag
        run: |
          BRANCH="${{ github.event.pull_request.base.ref }}"
          if [ "$BRANCH" = "main" ]; then
            echo "NPM_TAG=latest" >> $GITHUB_ENV
          else
            echo "NPM_TAG=$BRANCH" >> $GITHUB_ENV
          fi

      - name: Configure npm authentication
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Publishing rxor@${{ env.VERSION }} with tag ${{ env.NPM_TAG }}"
          npm publish --tag ${{ env.NPM_TAG }} --access public
